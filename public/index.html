function calculateCost(model, inTxt, outTxt) {
  const p = PRICING[model] || { in:0.5, out:1.5 };
  const inT = Math.ceil((inTxt||'').length / 4);
  const outT = Math.ceil((outTxt||'').length / 4);
  return ((inT * p.in) + (outT * p.out)) / 1000000;
}

async function callLLM(cfg, prompt, system='') {
  const { provider, model, key, endpoint: customUrl } = cfg;
  if(!key) throw new Error('API Key missing.');

  if(provider === 'gemini') {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ contents:[{role:'user',parts:[{text:prompt}]}], systemInstruction: system ? {parts:[{text:system}]} : undefined })
    });
    const d = await res.json();
    return d.candidates?.[0]?.content?.parts?.[0]?.text || '';
  }

  const endpoint = provider === 'local' ? (customUrl || 'http://localhost:8080/v1') : provider === 'chutes' ? (window.location.protocol.startsWith('http') ? '/api/chutes' : (customUrl || 'https://api.chutes.ai/v1/chat/completions')) : 'https://api.openai.com/v1/chat/completions';
  const headers = { 'Content-Type':'application/json' };
  if(provider === 'chutes' && window.location.protocol.startsWith('http')) {
    headers['x-chutes-key'] = key; headers['x-chutes-url'] = customUrl || 'https://api.chutes.ai/v1/chat/completions';
  } else if(provider !== 'local') {
    headers['Authorization'] = `Bearer ${key}`;
  }

  const res = await fetch(endpoint, {
    method:'POST', headers,
    body:JSON.stringify({ model, messages:[...(system?[{role:'system',content:system}]:[]), {role:'user',content:prompt}], temperature:0.7 })
  });
  const d = await res.json();
  if(d.error) throw new Error(d.error.message);
  return d.choices?.[0]?.message?.content || '';
}

            <button onClick={()=>runStage(STAGES[0])} className="neo-btn" style={{...mono,fontSize:9,padding:'0 20px',height:48}}>Search →</button>
          </div>
        </div>
      </div>

      {Object.keys(stageOutput).length > 0 && (
         <div style={{marginBottom:32,display:'flex',gap:12}}>
            <button onClick={()=>{
              const name = topic || 'New Empire';
              setSelectedOpp({ name, signal: topic, vessel_offer: 'Pipeline Agent', stageOutput });
              setTab('factory');
            }} style={{...mono,fontSize:9,background:'rgba(184,255,0,0.1)',color:G,border:`1px solid ${G}`,padding:'12px 20px',cursor:'pointer'}}>
              Initialize Builder Engine →
            </button>
         </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:24,marginBottom:48}}>
        {STAGES.map(s=>(
          <div key={s.id} onClick={()=>!s.comingSoon&&runStage(s)} style={{background:SURFACE,border:`1px solid ${activeStage===s.id?s.color:BORDER}`,padding:24,position:'relative',overflow:'hidden',opacity:s.comingSoon?0.6:1,cursor:s.comingSoon?'not-allowed':'pointer',transition:'all .2s'}} onMouseOver={e=>!s.comingSoon&&(e.currentTarget.style.borderColor=s.color)} onMouseOut={e=>!s.comingSoon&&(e.currentTarget.style.borderColor=activeStage===s.id?s.color:BORDER)}>
            {activeStage===s.id && running && <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:s.color,animation:'scanline 1s linear infinite'}}/>}
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
              <span style={{fontSize:24,color:stageOutput[s.id]?s.color:s.comingSoon?DIM:MID}}>{s.icon}</span>
              {s.comingSoon ? (
                <span style={{...mono,fontSize:7,color:DIM,border:`1px solid ${DIM}`,padding:'2px 6px'}}>COMING SOON</span>
              ) : stageOutput[s.id] ? (
                <span style={{...mono,fontSize:7,color:s.color,border:`1px solid ${s.color}`,padding:'2px 6px',background:`${s.color}15`}}>COMPLETE</span>
              ) : null}
            </div>
            <p style={{...mono,fontSize:9,color:stageOutput[s.id]?s.color:MID,marginBottom:4}}>{s.label}</p>
            <p style={{fontSize:13,color:s.comingSoon?DIM:'#ccc',fontWeight:300,lineHeight:1.4}}>{s.desc}</p>
            
            {/* Scoring Visualization (Stage 02) */}
            {s.id === 'score' && stageOutput[s.id] && (
              <div style={{marginTop:16,display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {[['Market',8],['Pain',9],['Build',7],['Agent',10]].map(([l,v])=>(
                  <div key={l}>
                    <div style={{display:'flex',justifyContent:'space-between',fontSize:7,color:MID,marginBottom:2}}><span style={mono}>{l}</span><span>{v}/10</span></div>
                    <div style={{height:2,background:'#222'}}><div style={{height:'100%',background:s.color,width:`${v*10}%`}}/></div>
                  </div>
                ))}
              </div>
            )}
            {!s.comingSoon && !stageOutput[s.id] && !running && <div style={{marginTop:16,fontSize:8,color:DIM,textAlign:'right',...mono}}>Click to Run Stage →</div>}
          </div>
        ))}
      </div>

      {Object.entries(stageOutput).map(([id, out])=>(
        <div key={id} style={{background:SURFACE,border:`1px solid ${BORDER}`,borderLeft:`3px solid ${STAGES.find(s=>s.id===id).color}`,marginBottom:24}} className="anim-up">
          <div style={{padding:'12px 20px',borderBottom:`1px solid ${BORDER}`,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{...mono,fontSize:9,color:STAGES.find(s=>s.id===id).color}}>{STAGES.find(s=>s.id===id).label} Output</span>
            <button onClick={()=>navigator.clipboard.writeText(out)} style={{...mono,fontSize:7,background:'transparent',color:MID,border:`1px solid ${BORDER}`,padding:'4px 8px'}}>Copy</button>
          </div>
          <pre style={{padding:24,maxHeight:300,overflowY:'auto'}}>{out}</pre>
        </div>
      ))}
    </div>
  );
}

  const [step, setStep] = useState(0);
  const steps = [
    { q: "Welcome to the Empire", desc: "How do you want to dominate the Chrome Extension market?", options: ["Create Passive Income", "Automate Daily Tasks", "Build a Portfolio"] },
    { q: "Choose your starting Arsenal", desc: "Select your AI power source. You can always upgrade later.", options: ["Free (Gemini/Local)", "Standard (GPT-4o Mini)", "Pro (Architect Strategy)"] }
  ];
  return (
    <div style={{position:'fixed',inset:0,background:'#000',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{maxWidth:480,width:'100%',textAlign:'center'}} className="anim-up">
        <p style={{...mono,fontSize:10,color:G,marginBottom:16}}>Empire Initialization Sequence</p>
        <h2 style={{...disp,fontSize:48,color:'#fff',lineHeight:1,marginBottom:12}}>{steps[step].q}</h2>

        <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:40}}>
          {steps[step].options.map(o=>(
            <button key={o} onClick={()=>{if(step<steps.length-1)setStep(s=>s+1);else onComplete();}} style={{...mono,width:'100%',padding:18,background:'transparent',border:`1px solid ${BORDER}`,color:MID,cursor:'pointer',fontSize:12,transition:'all .2s'}} onMouseOver={e=>e.target.style.borderColor=G} onMouseOut={e=>e.target.style.borderColor=BORDER}>{o}</button>

        <div style={{display:'flex',gap:6,justifyContent:'center'}}>

        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('pipeline');
  const [opps, setOpps] = useState(SEED_OPPS);
  const [selectedOpp, setSelectedOpp] = useState(null);
  const [providerCfg, setProviderCfg] = useState(() => {
    const s = localStorage.getItem('ee_provider_cfg');
    return s ? JSON.parse(s) : {provider:'', model:'', key:''};
  });
  const [built, setBuilt] = useState(() => {
    const s = localStorage.getItem('ee_built');
    return s ? JSON.parse(s) : SEED_BUILT;
  });
  const [totalSpend, setTotalSpend] = useState(() => {
    const s = localStorage.getItem('ee_total_spend');
    return s ? Number(s) : 0;
  });
  const [onboarding, setOnboarding] = useState(() => localStorage.getItem('ee_onboard') !== 'done');
  
  const [isBuilding, setIsBuilding] = useState(false);
  const [buildStep, setBuildStep] = useState('');
  const [buildLog, setBuildLog] = useState([]);
  const [buildOutputs, setBuildOutputs] = useState({});
  const logRef = useRef(null);

  useEffect(() => localStorage.setItem('ee_provider_cfg', JSON.stringify(providerCfg)), [providerCfg]);
  useEffect(() => localStorage.setItem('ee_built', JSON.stringify(built)), [built]);
  useEffect(() => localStorage.setItem('ee_total_spend', totalSpend.toString()), [totalSpend]);
  useEffect(() => { if(!onboarding) localStorage.setItem('ee_onboard', 'done'); }, [onboarding]);

  const addLog = (msg, type) => setBuildLog(p=>[...p, {msg, type}]);

  const runBuild = async (opp) => {
    setTab('factory'); setIsBuilding(true); setBuildLog([]); setBuildOutputs({});
    const stages = [
      {id:'research',label:'Research',arch:true},
      {id:'blueprint',label:'Blueprint',arch:true},
      {id:'manifest',label:'manifest.json'},
      {id:'background',label:'background.js'},
      {id:'content',label:'content.js'},
      {id:'popup',label:'popup UI'},
      {id:'listing',label:'Listing'}
    ];
    try {
      const res = {};
      for(const s of stages) {
        setBuildStep(s.id);
        const model = s.arch ? 'gpt-4o' : 'claude-3-5-sonnet-20241022';
        addLog(`▶ [${s.arch?'ARCHITECT':'CODER'}] ${s.label} (${model})`, 'running');
        const system = `You are the Lead Magnet Engineer. Build a viral extension for ${opp.name}.
        Requirements:
        - Include Vessel Protocol CTA: "Like this app? Join the Vessel Protocol today and we will show you how to create your own."
        - Generate code for a Referral Sharing system in the popup UI.
        - Ensure high utility and low friction for new users.`;
        const out = await callLLM({...providerCfg, model}, `Build ${s.label} for ${opp.name}. Reference topic: ${opp.signal}.`, system);
        const cost = calculateCost(model, opp.name, out);
        setTotalSpend(p=>p+cost);
        res[s.id] = out;
        setBuildOutputs({...res});
        addLog(`✓ ${s.label} ($${cost.toFixed(4)})`, 'done');
      }
      setBuilt(p=>[{id:Date.now(),name:opp.name,installs:0,leads:0,vessel_ctr:'0%',offer:'Agent'},...p]);
    } catch(e){ addLog(`✗ Error: ${e.message}`, 'error'); }
    setIsBuilding(false);
  };

  return (
    <div style={{minHeight:'100vh',background:'#050505'}}>
      {onboarding && <OnboardingView onComplete={()=>setOnboarding(false)}/>}
      <Nav tab={tab} setTab={setTab} providerCfg={providerCfg} setProviderCfg={setProviderCfg}/>
      <div style={{paddingTop:52,position:'relative',zIndex:1}}>
        {tab==='pipeline' && <PipelineView providerCfg={providerCfg} setTab={setTab} setSelectedOpp={setSelectedOpp}/>}
        {tab==='opportunities' && <OpportunitiesView opps={opps} setOpps={setOpps} onSelect={runBuild} providerCfg={providerCfg}/>}
        {tab==='factory' && <FactoryView isBuilding={isBuilding} buildStep={buildStep} outputs={buildOutputs} log={buildLog} logRef={logRef}/>}
        {tab==='built' && <BuiltView built={built}/>}
        {tab==='admin' && <AdminView totalSpend={totalSpend}/>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
